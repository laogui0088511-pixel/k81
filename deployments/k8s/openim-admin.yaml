# K8s deployment for openim-admin (Web UI, nginx static site)
# ----------------------------------------------------------
# Prereqs:
#   1) 在 openim-admin/openim-admin/ 有 Dockerfile + dist/ + nginx.conf
#      当前缺少 nginx.conf —— 请先建一个（见本文件末尾示例）
#   2) docker build -t openim-admin:latest .
#      docker tag openim-admin:latest registry.digitalocean.com/op1/openim-admin:latest
#      docker push registry.digitalocean.com/op1/openim-admin:latest
#   3) kubectl apply -f deployments/k8s/openim-admin.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openim-admin
  namespace: openim
  labels:
    app: openim-admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openim-admin
  template:
    metadata:
      labels:
        app: openim-admin
    spec:
      imagePullSecrets:
        - name: registry-op1
      containers:
        - name: openim-admin
          image: registry.digitalocean.com/op1/openim-admin:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: openim-admin
  namespace: openim
spec:
  type: ClusterIP
  selector:
    app: openim-admin
  ports:
    - name: http
      port: 80
      targetPort: 80

