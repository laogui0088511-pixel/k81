# Infra (dev/single-replica) for openim: MongoDB, Redis, Kafka+Zookeeper, MinIO
# -----------------------------------------------------------------------------
# 用法：
#   kubectl apply -f deployments/k8s/infra.yaml
#
# 服务 DNS（集群内）：
#   mongo.openim.svc.cluster.local:27017
#   redis.openim.svc.cluster.local:6379
#   kafka.openim.svc.cluster.local:9092
#   zookeeper.openim.svc.cluster.local:2181
#   minio.openim.svc.cluster.local:9000   (S3 API)
#   minio.openim.svc.cluster.local:9001   (Console)
#
# 凭据统一：user=root, password=openIM123  （与 .env 保持一致）
#
# 注意：
# - 这是开发级单副本配置，**不适合生产**。生产请用 bitnami helm chart。
# - PVC 默认用 do-block-storage (DigitalOcean Block Storage)；
#   如果集群不是 DOKS，改成你集群对应的 storageClassName。
# - 镜像大小：每个容器拉取时间视网络而定。

---
############################
# MongoDB
############################
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-data
  namespace: openim
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: do-block-storage
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  namespace: openim
  labels: { app: mongo }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: mongo } }
  template:
    metadata: { labels: { app: mongo } }
    spec:
      containers:
        - name: mongo
          image: mongo:6.0.2
          args: ["--auth"]
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              value: root
            - name: MONGO_INITDB_ROOT_PASSWORD
              value: openIM123
            - name: MONGO_INITDB_DATABASE
              value: openIM_v3
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: data
              mountPath: /data/db
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 1,    memory: 1Gi }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mongo-data
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: openim
spec:
  type: ClusterIP
  selector: { app: mongo }
  ports:
    - port: 27017
      targetPort: 27017

---
############################
# Redis
############################
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: openim
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: do-block-storage
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: openim
  labels: { app: redis }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: redis } }
  template:
    metadata: { labels: { app: redis } }
    spec:
      containers:
        - name: redis
          image: redis:7.0.0
          command: ["redis-server", "--requirepass", "openIM123", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests: { cpu: 50m,  memory: 128Mi }
            limits:   { cpu: 500m, memory: 512Mi }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: redis-data
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: openim
spec:
  type: ClusterIP
  selector: { app: redis }
  ports:
    - port: 6379
      targetPort: 6379

---
############################
# Zookeeper (for Kafka)
############################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper
  namespace: openim
  labels: { app: zookeeper }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: zookeeper } }
  template:
    metadata: { labels: { app: zookeeper } }
    spec:
      containers:
        - name: zookeeper
          image: zookeeper:3.8
          env:
            - name: ZOO_4LW_COMMANDS_WHITELIST
              value: "srvr,ruok"
            - name: JVMFLAGS
              value: "-Xmx512m -Xms256m"
          ports:
            - containerPort: 2181
          resources:
            requests: { cpu: 100m, memory: 768Mi }
            limits:   { cpu: 1,    memory: 1536Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  namespace: openim
spec:
  type: ClusterIP
  selector: { app: zookeeper }
  ports:
    - port: 2181
      targetPort: 2181

---
############################
# Kafka
############################
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kafka-data
  namespace: openim
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: do-block-storage
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: openim
  labels: { app: kafka }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: kafka } }
  template:
    metadata: { labels: { app: kafka } }
    spec:
      enableServiceLinks: false
      containers:
        - name: kafka
          image: wurstmeister/kafka:latest
          env:
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: "zookeeper:2181"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://:9092"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka.openim.svc.cluster.local:9092"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_HEAP_OPTS
              value: "-Xmx768m -Xms512m"
          ports:
            - containerPort: 9092
          volumeMounts:
            - name: data
              mountPath: /kafka
          resources:
            requests: { cpu: 100m, memory: 512Mi }
            limits:   { cpu: 2,    memory: 2Gi  }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kafka-data
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: openim
spec:
  type: ClusterIP
  selector: { app: kafka }
  ports:
    - port: 9092
      targetPort: 9092

---
############################
# MinIO
############################
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: openim
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: do-block-storage
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: openim
  labels: { app: minio }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector: { matchLabels: { app: minio } }
  template:
    metadata: { labels: { app: minio } }
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - name: MINIO_ROOT_USER
              value: root
            - name: MINIO_ROOT_PASSWORD
              value: openIM123
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 1,    memory: 1Gi }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-data
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: openim
spec:
  type: ClusterIP
  selector: { app: minio }
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
